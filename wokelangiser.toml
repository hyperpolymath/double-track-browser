# SPDX-License-Identifier: MPL-2.0
# wokelangiser manifest for double-track-browser
# (PMPL-1.0-or-later preferred; MPL-2.0 required for browser extension store)

[project]
name = "double-track-browser"

[consent]
gdpr = true
ccpa = true
default-state = "opt-out"
categories = ["functional", "analytics", "third-party"]

[accessibility]
wcag-level = "AA"
check-contrast = true
check-alt-text = true
check-aria = true
min-contrast-ratio = 4.5

[i18n]
default-locale = "en-GB"
supported-locales = ["en-GB", "fr-FR", "de-DE"]
extract-strings = true

[report]
format = "text"
